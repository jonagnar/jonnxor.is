title: "Go error wrapping, the saga pattern"
tags: ["go", "errors"]
updated: "2026-05-26"
body: |
  <p>Every error should read like a saga line: who attempted what, and what stood in the way. Wrap with context at every boundary; never log <em>and</em> return.</p><h2>The pattern</h2><pre class="code"><span class="kw">func</span> (s *Store) <span class="fn">LoadSaga</span>(ctx context.Context, id <span class="kw">string</span>) (*Saga, <span class="kw">error</span>) {
      row, err := s.db.<span class="fn">QueryRow</span>(ctx, qSaga, id)
      <span class="kw">if</span> err != <span class="kw">nil</span> {
          <span class="cm">// wrap: add the chapter, keep the cause</span>
          <span class="kw">return</span> <span class="kw">nil</span>, fmt.<span class="fn">Errorf</span>(<span class="st">"load saga %s: %w"</span>, id, err)
      }
      <span class="kw">return</span> row, <span class="kw">nil</span>
  }
  
  <span class="cm">// at the top of the world, choose the reaction once:</span>
  <span class="kw">if</span> errors.<span class="fn">Is</span>(err, pgx.ErrNoRows) { <span class="kw">return</span> http.StatusNotFound }
  <span class="kw">var</span> qe *QuotaError
  <span class="kw">if</span> errors.<span class="fn">As</span>(err, &amp;qe) { <span class="kw">return</span> http.StatusTooManyRequests }</pre><h2>The three rules</h2><ul><li><strong>Wrap with <code class="inline">%w</code></strong> at every layer boundary — repository, service, handler.</li><li><strong>Decide once</strong>: the outermost layer maps errors to status codes / messages. Inner layers never print.</li><li><strong>Sentinel errors are public API.</strong> Export them deliberately or not at all.</li></ul>
