body: |
  <p>The first true wall in Bloodborne, and the lesson-teacher: aggression is defense. Written for new hunters who keep meeting the fog wall.</p><h2>Before the fight</h2><ul><li>Grab the <strong>Music Box</strong> from the little girl in the window (Central Yharnam, after the bridge shortcut). It staggers him three times.</li><li>Farm the two brick trolls near the lamp if you’re under level 15 — echoes spent are echoes saved.</li><li>Bring <strong>oil urns + Molotovs</strong> for phase 3.</li></ul><h2>The three phases</h2><ol><li><strong>Hunter (axe + pistol):</strong> stay close and circle left. His gun only matters at range. Parry windows on the two-hand slam are generous.</li><li><strong>Extended axe:</strong> he gains reach and poise. Use the tombstones as cover — he destroys them, you don’t care, it costs him the swing.</li><li><strong>Beast:</strong> drop the Music Box, run in, unload everything. He staggers off headshots mid-leap. The fountain area is the safest arena.</li></ol><h2>If you’re still stuck</h2><div class="tip"><b>Hesitation is defeat</b>Healing at range invites the leap. Heal <em>while</em> circling, never while backpedaling in a straight line.</div>
