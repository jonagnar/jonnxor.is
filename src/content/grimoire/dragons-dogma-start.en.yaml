body: |
  <p>Aught taken is aught earned. A spoiler-light path through the opening so you don’t lock yourself out of the good stuff.</p><h2>The five rules</h2><ol><li><strong>Vocation:</strong> start Fighter or Archer; Trickster is a second-playthrough class no matter what your heart says.</li><li><strong>Main pawn:</strong> make them the opposite of you. Melee Arisen → Mage pawn. You can respec later; their early inclination sticks around.</li><li><strong>Do not rush Vernworth.</strong> The road events between Melve and the capital are the tutorial the game refuses to label.</li><li><strong>Port crystals are precious.</strong> Don’t place one until you’ve seen the volcanic island.</li><li><strong>Sleep at inns</strong>, not camps, when you’ve done anything important — inn saves are your only real checkpoint.</li></ol><h2>On pawns</h2><div class="tip"><b>Pawn chatter</b>Yes, they never stop talking. No, you can’t fully turn it off. They’re masterworks all; you can’t go wrong.</div>
