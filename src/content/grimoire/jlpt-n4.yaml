title: "日本語: particles I keep mixing up"
tags: ["japanese", "study"]
updated: "2026-06-08"
body: |
  <p>Personal N4-climbing notes. は vs が is a lifelong boss fight; these are the openings I’ve found.</p><h2>The particle table</h2><table class="doc-table"><thead><tr><th>Particle</th><th>Job</th><th>Hook</th></tr></thead><tbody><tr><td>は</td><td>topic — “as for X…”</td><td>spotlight on what comes <em>after</em></td></tr><tr><td>が</td><td>subject — new info, emphasis</td><td>spotlight on what comes <em>before</em></td></tr><tr><td>に</td><td>destination, time, existence</td><td>a pin on the map</td></tr><tr><td>で</td><td>location of action, means</td><td>the stage, the tool</td></tr><tr><td>を</td><td>direct object</td><td>the thing the verb eats</td></tr></tbody></table><h2>Mnemonics</h2><div class="tip"><b>Mnemonic</b>図書館<strong>で</strong>勉強する (study <em>at</em> the library — stage) vs 図書館<strong>に</strong>行く (go <em>to</em> the library — pin).</div>
