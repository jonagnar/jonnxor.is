<!doctype html>
<html lang="en" data-theme="rune">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Game Tracker — JonnXor</title>
<script>(function(){try{var t=localStorage.getItem('jx-theme');if(t){document.documentElement.setAttribute('data-theme',t);}}catch(e){}})();</script>
<link rel="stylesheet" href="assets/tokens.css">
<link rel="stylesheet" href="assets/site.css">
<style>
  .tracker-tabs { margin: 0 0 28px; }
  .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
  .game-card { overflow: hidden; display: flex; flex-direction: column; }
  .game-card .cover {
    aspect-ratio: 3 / 4;
    position: relative;
    display: grid;
    place-items: center;
    color: rgba(255, 255, 255, .92);
    overflow: hidden;
  }
  .game-card .cover .gi {
    font-family: var(--font-display);
    font-size: 38px;
    font-weight: 900;
    letter-spacing: .06em;
    text-shadow: 0 2px 16px rgba(0, 0, 0, .45);
  }
  .game-card .cover .countdown {
    position: absolute;
    top: 10px;
    left: 10px;
  }
  .game-card .cover .fav {
    position: absolute;
    top: 10px;
    right: 10px;
    color: var(--gold);
    filter: drop-shadow(0 0 calc(var(--glow-r) * .5) var(--glow-gold));
    font-size: 16px;
  }
  .game-card .body { padding: 14px 16px 16px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
  .game-card h3 { font-family: var(--font-body); font-size: 15px; font-weight: 700; margin: 0; line-height: 1.3; }
  .game-card .sub { font-size: 12.5px; color: var(--ink-faint); margin: 0; }
  .game-card .plats { display: flex; flex-wrap: wrap; gap: 5px; margin-top: auto; }
  .empty-note { color: var(--ink-faint); text-align: center; padding: 48px 0; font-family: var(--font-display); letter-spacing: .12em; font-size: 13px; }
</style>
</head>
<body data-page="games">
<header class="site-nav"></header>

<main>
  <section class="page-head" data-screen-label="Games head">
    <div class="container">
      <p class="kicker">Game tracker</p>
      <h1>The Game Hall</h1>
      <p class="lede">What I'm waiting for, what I'm playing, what I've slain — and the favorites I'd defend in single combat.</p>
    </div>
  </section>

  <div class="container">
    <div class="rune-divider" aria-hidden="true"><span class="runes"></span></div>

    <div class="tabs tracker-tabs" role="tablist" data-screen-label="Tracker tabs">
      <button class="tab" role="tab" data-tab="upcoming" type="button">Upcoming</button>
      <button class="tab active" role="tab" data-tab="playing" type="button">Playing</button>
      <button class="tab" role="tab" data-tab="played" type="button">Played</button>
      <button class="tab" role="tab" data-tab="favorites" type="button">Favorites</button>
    </div>

    <section class="game-grid" id="game-grid" data-screen-label="Game grid"></section>
  </div>
</main>

<footer class="site-footer"></footer>

<script src="assets/site.js"></script>
<script>
(function () {
  'use strict';

  var GAMES = [
    // ---- upcoming ----
    { tab: 'upcoming', title: 'Grand Theft Auto VI', sub: 'Rockstar · open world', date: '2026-11-19', plats: ['PS5', 'Xbox'], grad: ['#2b0a3d', '#b0316e', '#f5e642'], gi: 'VI' },
    { tab: 'upcoming', title: 'Fable', sub: 'Playground · RPG', date: '2026-10-09', plats: ['Xbox', 'PC'], grad: ['#0e2d1c', '#2e7d4f', '#ecbd3e'], gi: 'FA' },
    { tab: 'upcoming', title: 'The Duskmere Saga', sub: 'Indie · narrative RPG (placeholder)', date: '2026-08-14', plats: ['PC', 'Switch'], grad: ['#101a33', '#27447e', '#3fe0cb'], gi: 'DS' },
    { tab: 'upcoming', title: 'Hollow Knight: Silksong', sub: 'Team Cherry · any day now, surely', date: null, plats: ['PC', 'Switch'], grad: ['#1a0f24', '#5d2a66', '#e85f6a'], gi: 'SS' },

    // ---- playing ----
    { tab: 'playing', title: 'Elden Ring: Nightreign', sub: 'NG+2 · co-op runs, dying with style', plats: ['PS5'], grad: ['#10131c', '#3a4a2e', '#f2c94c'], gi: 'ER' },
    { tab: 'playing', title: 'Monster Hunter Wilds', sub: 'HR 84 · insect glaive apologist', plats: ['PC'], grad: ['#27190c', '#7d5326', '#3fe0cb'], gi: 'MH' },
    { tab: 'playing', title: 'Baldur\u2019s Gate 3', sub: 'Honour mode \u00b7 attempt #3, pray for us', plats: ['PC'], grad: ['#1c0f0f', '#6e2230', '#ecbd3e'], gi: 'BG' },

    // ---- played ----
    { tab: 'played', title: 'Lies of P: Overture', sub: 'Slain · 41 h · stagger is a love language', plats: ['PS5'], grad: ['#14141e', '#444f6e', '#d9c27a'], gi: 'LP' },
    { tab: 'played', title: 'Clair Obscur: Expedition 33', sub: 'Finished · 58 h · still humming the OST', plats: ['PC'], grad: ['#0d1a26', '#1f5b73', '#e0d9c0'], gi: 'CO' },
    { tab: 'played', title: 'Astro Bot', sub: 'Platinum · 100% · pure serotonin', plats: ['PS5'], grad: ['#0a1f33', '#1d63b8', '#f5e642'], gi: 'AB' },
    { tab: 'played', title: 'Metaphor: ReFantazio', sub: 'Finished · 92 h · vote Dreki', plats: ['PS5'], grad: ['#1c1410', '#8a4c1f', '#3fe0cb'], gi: 'MR' },

    // ---- favorites ----
    { tab: 'favorites', title: 'Dragon\u2019s Dogma', sub: 'They\u2019re masterworks all, you can\u2019t go wrong', plats: ['Series'], grad: ['#231307', '#94501c', '#f2c94c'], gi: 'DD', fav: true },
    { tab: 'favorites', title: 'Dark Souls I–III', sub: 'The trilogy \u00b7 praise the sun', plats: ['Series'], grad: ['#15120c', '#5e5034', '#e8d9a0'], gi: 'DS', fav: true },
    { tab: 'favorites', title: 'Elden Ring', sub: 'GOTY of a generation \u00b7 maidenless no more', plats: ['PS5', 'PC'], grad: ['#101708', '#46551f', '#f2c94c'], gi: 'ER', fav: true },
    { tab: 'favorites', title: 'Sekiro', sub: 'Hesitation is defeat', plats: ['PC'], grad: ['#1b0d0d', '#7e2a20', '#ecdcb8'], gi: 'SK', fav: true },
    { tab: 'favorites', title: 'Bloodborne', sub: 'Fear the old blood \u00b7 60 fps someday', plats: ['PS4'], grad: ['#0d0d14', '#3c2f4d', '#9e2f3c'], gi: 'BB', fav: true },
    { tab: 'favorites', title: 'Silver', sub: '1999 \u00b7 the one that started it all', plats: ['PC', 'Dreamcast'], grad: ['#0e1620', '#3a5a78', '#cfd8e0'], gi: 'SV', fav: true }
  ];

  var grid = document.getElementById('game-grid');

  function cardHTML(g) {
    var grad = 'linear-gradient(150deg, ' + g.grad[0] + ', ' + g.grad[1] + ' 58%, ' + g.grad[2] + ' 150%)';
    var badge = '';
    if (g.tab === 'upcoming') {
      if (g.date) {
        var c = window.JX.daysUntil(g.date);
        badge = '<span class="badge tq countdown">' + (c.past ? 'OUT NOW' : c.days + ' days') + '</span>';
      } else {
        badge = '<span class="badge quiet countdown">TBA</span>';
      }
    }
    var fav = g.fav ? '<span class="fav" aria-label="Favorite">★</span>' : '';
    var plats = g.plats.map(function (p) { return '<span class="chip">' + p + '</span>'; }).join('');
    return (
      '<article class="card lift game-card">' +
        '<div class="cover" style="background: ' + grad + ';">' +
          '<span class="gi">' + g.gi + '</span>' + badge + fav +
        '</div>' +
        '<div class="body">' +
          '<h3>' + g.title + '</h3>' +
          '<p class="sub">' + g.sub + '</p>' +
          '<div class="plats">' + plats + '</div>' +
        '</div>' +
      '</article>'
    );
  }

  function render(tab) {
    var items = GAMES.filter(function (g) { return g.tab === tab; });
    grid.innerHTML = items.length
      ? items.map(cardHTML).join('')
      : '<p class="empty-note">The hall is quiet\u2026 for now.</p>';
  }

  document.querySelectorAll('.tracker-tabs .tab').forEach(function (btn) {
    btn.addEventListener('click', function () {
      document.querySelectorAll('.tracker-tabs .tab').forEach(function (b) { b.classList.remove('active'); });
      btn.classList.add('active');
      render(btn.getAttribute('data-tab'));
      try { localStorage.setItem('jx-games-tab', btn.getAttribute('data-tab')); } catch (e) {}
    });
  });

  var saved = null;
  try { saved = localStorage.getItem('jx-games-tab'); } catch (e) {}
  if (saved) {
    document.querySelectorAll('.tracker-tabs .tab').forEach(function (b) {
      b.classList.toggle('active', b.getAttribute('data-tab') === saved);
    });
  }
  render(saved || 'playing');
})();
</script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="assets/tweaks-panel.jsx"></script>
<script type="text/babel" src="assets/tweaks.jsx"></script>
</body>
</html>
