<!-- @dsCard group="Colors" viewport="700x205" subtitle="Rune Night (default) — electric turquoise + neon yellow on near-black" name="Palette — Rune Night" -->
<!doctype html>
<html lang="en" data-theme="rune">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../assets/tokens.css">
<link rel="stylesheet" href="cards.css">
</head>
<body>
<div class="col">
  <div class="row">
    <div class="sw"><div class="box" style="background: var(--bg);"></div><div class="nm">bg<br>#07060c</div></div>
    <div class="sw"><div class="box" style="background: var(--bg-2);"></div><div class="nm">bg-2<br>#0b0915</div></div>
    <div class="sw"><div class="box" style="background: var(--surface);"></div><div class="nm">surface<br>#100d1d</div></div>
    <div class="sw"><div class="box" style="background: var(--surface-2);"></div><div class="nm">surface-2<br>#171330</div></div>
    <div class="sw"><div class="box" style="background: var(--line);"></div><div class="nm">line<br>#221e3e</div></div>
    <div class="sw"><div class="box" style="background: var(--ink);"></div><div class="nm">ink<br>#f1f5f4</div></div>
  </div>
  <div class="row">
    <div class="sw"><div class="box" style="background: var(--tq);"></div><div class="nm">tq<br>#00f5d4</div></div>
    <div class="sw"><div class="box" style="background: var(--tq-ink);"></div><div class="nm">tq-ink<br>#2cffe5</div></div>
    <div class="sw"><div class="box" style="background: var(--gold);"></div><div class="nm">gold<br>#f5e642</div></div>
    <div class="sw"><div class="box" style="background: var(--tq-soft); border-color: var(--line-strong);"></div><div class="nm">tq-soft<br>10%</div></div>
    <div class="sw"><div class="box" style="background: var(--ink-soft);"></div><div class="nm">ink-soft<br>#a3aac4</div></div>
    <div class="sw"><div class="box" style="background: var(--ink-faint);"></div><div class="nm">ink-faint<br>#6a7190</div></div>
  </div>
</div>
</body>
</html>
