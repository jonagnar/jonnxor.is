<!-- @dsCard group="Colors" viewport="700x205" subtitle="Neon — pink synthwave; pink takes the accent channel, yellow stays" name="Palette — Neon" -->
<!doctype html>
<html lang="en" data-theme="neon">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../assets/tokens.css">
<link rel="stylesheet" href="cards.css">
</head>
<body>
<div class="col">
  <div class="row">
    <div class="sw"><div class="box" style="background: var(--bg);"></div><div class="nm">bg<br>#0c0614</div></div>
    <div class="sw"><div class="box" style="background: var(--bg-2);"></div><div class="nm">bg-2<br>#120822</div></div>
    <div class="sw"><div class="box" style="background: var(--surface);"></div><div class="nm">surface<br>#190b2c</div></div>
    <div class="sw"><div class="box" style="background: var(--surface-2);"></div><div class="nm">surface-2<br>#23103e</div></div>
    <div class="sw"><div class="box" style="background: var(--line);"></div><div class="nm">line<br>#3a1d55</div></div>
    <div class="sw"><div class="box" style="background: var(--ink);"></div><div class="nm">ink<br>#fdf3fb</div></div>
  </div>
  <div class="row">
    <div class="sw"><div class="box" style="background: var(--tq);"></div><div class="nm">tq (pink!)<br>#ff3dae</div></div>
    <div class="sw"><div class="box" style="background: var(--tq-ink);"></div><div class="nm">tq-ink<br>#ff77cb</div></div>
    <div class="sw"><div class="box" style="background: var(--gold);"></div><div class="nm">gold<br>#ffe14d</div></div>
    <div class="sw"><div class="box" style="background: var(--tq-deep);"></div><div class="nm">tq-deep<br>#c2187d</div></div>
    <div class="sw"><div class="box" style="background: var(--ink-soft);"></div><div class="nm">ink-soft<br>#cbaed0</div></div>
    <div class="sw"><div class="box" style="background: var(--ink-faint);"></div><div class="nm">ink-faint<br>#95709f</div></div>
  </div>
</div>
</body>
</html>
