<!-- @dsCard group="Colors" viewport="700x205" subtitle="Dawn — Icelandic daylight (light, zero glow)" name="Palette — Dawn" -->
<!doctype html>
<html lang="en" data-theme="dawn">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../assets/tokens.css">
<link rel="stylesheet" href="cards.css">
</head>
<body>
<div class="col">
  <div class="row">
    <div class="sw"><div class="box" style="background: var(--bg);"></div><div class="nm">bg<br>#faf6ec</div></div>
    <div class="sw"><div class="box" style="background: var(--bg-2);"></div><div class="nm">bg-2<br>#f3edda</div></div>
    <div class="sw"><div class="box" style="background: var(--surface);"></div><div class="nm">surface<br>#fffdf6</div></div>
    <div class="sw"><div class="box" style="background: var(--surface-2);"></div><div class="nm">surface-2<br>#f7f2e4</div></div>
    <div class="sw"><div class="box" style="background: var(--line);"></div><div class="nm">line<br>#e3dac2</div></div>
    <div class="sw"><div class="box" style="background: var(--ink);"></div><div class="nm">ink<br>#17150e</div></div>
  </div>
  <div class="row">
    <div class="sw"><div class="box" style="background: var(--tq);"></div><div class="nm">tq<br>#0e9488</div></div>
    <div class="sw"><div class="box" style="background: var(--tq-ink);"></div><div class="nm">tq-ink<br>#0b6e64</div></div>
    <div class="sw"><div class="box" style="background: var(--gold);"></div><div class="nm">gold<br>#ecbd3e</div></div>
    <div class="sw"><div class="box" style="background: var(--gold-ink);"></div><div class="nm">gold-ink<br>#876312</div></div>
    <div class="sw"><div class="box" style="background: var(--ink-soft);"></div><div class="nm">ink-soft<br>#4d4839</div></div>
    <div class="sw"><div class="box" style="background: var(--ink-faint);"></div><div class="nm">ink-faint<br>#8b8470</div></div>
  </div>
</div>
</body>
</html>
