<!-- @dsCard group="Spacing" viewport="700x200" subtitle="4px base scale · radii stay small and angular" name="Spacing & radii" -->
<!doctype html>
<html lang="en" data-theme="rune">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../assets/tokens.css">
<link rel="stylesheet" href="cards.css">
<style>
  .bar { height: 14px; background: var(--tq-soft); border: 1px solid var(--tq-deep); border-radius: 3px; }
  .rbox { width: 56px; height: 40px; background: var(--surface-2); border: 1px solid var(--line-strong); display: grid; place-items: center; font-family: var(--font-mono); font-size: 10px; color: var(--ink-soft); }
</style>
</head>
<body>
<div class="row" style="gap: 32px; align-items: flex-start;">
  <div class="col" style="gap: 6px; flex: 1;">
    <span class="lbl">Space 1–8</span>
    <div class="bar" style="width: 4px;"></div>
    <div class="bar" style="width: 8px;"></div>
    <div class="bar" style="width: 12px;"></div>
    <div class="bar" style="width: 16px;"></div>
    <div class="bar" style="width: 24px;"></div>
    <div class="bar" style="width: 32px;"></div>
    <div class="bar" style="width: 48px;"></div>
    <div class="bar" style="width: 72px;"></div>
  </div>
  <div class="col" style="gap: 10px;">
    <span class="lbl">Radii</span>
    <div class="row">
      <div class="rbox" style="border-radius: var(--r-sm);">4</div>
      <div class="rbox" style="border-radius: var(--r-md);">8</div>
      <div class="rbox" style="border-radius: var(--r-lg);">14</div>
      <div class="rbox" style="border-radius: 99px;">99</div>
    </div>
    <span style="font-size: 12px; color: var(--ink-faint); max-width: 30ch;">4 buttons · 8 cards · 14 lightbox · pill only for toggles &amp; chips</span>
  </div>
</div>
</body>
</html>
