<!-- @dsCard group="Colors" viewport="700x180" subtitle="Accent channel (tq) is structure & frequency; gold is scarce treasure" name="Color roles" -->
<!doctype html>
<html lang="en" data-theme="rune">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../assets/tokens.css">
<link rel="stylesheet" href="../../assets/site.css">
<link rel="stylesheet" href="cards.css">
</head>
<body>
<div class="row" style="gap: 28px; align-items: flex-start;">
  <div class="col" style="gap: 10px;">
    <span class="lbl" style="color: var(--tq-ink);">Accent — structure</span>
    <div class="row">
      <a href="#" style="font-size: 14px;">A link</a>
      <span class="chip tq">Active chip</span>
      <span class="kicker" style="margin: 0; font-size: 11px;">Kicker</span>
    </div>
    <span style="font-size: 12.5px; color: var(--ink-faint);">Links, active states, kickers, strokes. Frequent.</span>
  </div>
  <div class="col" style="gap: 10px;">
    <span class="lbl" style="color: var(--gold-ink);">Gold — treasure</span>
    <div class="row">
      <a class="btn btn-gold" href="#" style="padding: 9px 16px;">Primary CTA</a>
      <span class="badge">7 days</span>
      <span style="color: var(--gold); font-size: 16px;">★</span>
    </div>
    <span style="font-size: 12.5px; color: var(--ink-faint);">CTAs, badges, favorites. Scarce — if everything glows gold, nothing is treasure.</span>
  </div>
</div>
</body>
</html>
